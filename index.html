<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Climax Lounge — Select Your Table</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{
  --void: #020810;
  --void2: #050F1A;
  --void3: #0A1628;
  --void4: #0F1F38;
  --cyan: #00FFE5;
  --cyan2: #00C4B0;
  --pink: #FF2D78;
  --lime: #A8FF3E;
  --text: #E8F8FF;
  --muted: #4A7A8A;
  --border-c: rgba(0,255,229,.18);
  --glow-c: 0 0 20px rgba(0,255,229,.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Exo 2',sans-serif;
  background:var(--void);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse 60% 50% at 10% 10%,rgba(0,255,229,.05) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 90% 90%,rgba(255,45,120,.04) 0%,transparent 55%);
  pointer-events:none;
  z-index:0;
}
.table-picker{
  text-align:center;
  padding:40px 24px;
  max-width:500px;
  width:100%;
  position:relative;
  z-index:1;
}
.logo{
  font-family:'Black Ops One',sans-serif;
  font-size:2.4rem;
  letter-spacing:.12em;
  color:var(--cyan);
  text-shadow:var(--glow-c);
  margin-bottom:4px;
  animation:logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse{
  0%,100%{text-shadow:var(--glow-c);}
  50%{text-shadow:0 0 30px rgba(0,255,229,.6),0 0 80px rgba(0,255,229,.25);}
}
.sub{
  font-size:.6rem;
  letter-spacing:.3em;
  text-transform:uppercase;
  color:var(--cyan2);
  margin-bottom:44px;
  opacity:.7;
}
.heading{
  font-family:'Black Ops One',sans-serif;
  font-size:clamp(1.6rem,5vw,2.6rem);
  margin-bottom:8px;
}
.desc{
  font-size:.82rem;
  color:var(--muted);
  margin-bottom:36px;
}
.table-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-bottom:28px;
}
.tbl-btn{
  aspect-ratio:1;
  border-radius:6px;
  border:1px solid var(--border-c);
  background:rgba(0,255,229,.04);
  font-family:'Share Tech Mono',monospace;
  font-size:1.1rem;
  color:var(--muted);
  cursor:pointer;
  transition:all .18s;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.tbl-btn::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(0,255,229,.1),transparent);
  opacity:0;
  transition:opacity .18s;
}
.tbl-btn:hover{
  border-color:var(--cyan);
  color:var(--cyan);
  background:rgba(0,255,229,.08);
}
.tbl-btn:hover::before{opacity:1;}
.tbl-btn.sel{
  background:var(--cyan);
  color:var(--void);
  border-color:var(--cyan);
  transform:scale(1.08);
  box-shadow:var(--glow-c);
  font-weight:700;
}
.tp-confirm{
  padding:15px 40px;
  border-radius:4px;
  background:transparent;
  border:2px solid var(--cyan);
  color:var(--cyan);
  font-family:'Exo 2',sans-serif;
  font-size:.78rem;
  font-weight:700;
  letter-spacing:.2em;
  text-transform:uppercase;
  transition:all .22s;
  opacity:.3;
  pointer-events:none;
  position:relative;
  overflow:hidden;
  cursor:pointer;
}
.tp-confirm::before{
  content:'';
  position:absolute;
  inset:0;
  background:var(--cyan);
  transform:translateX(-100%);
  transition:transform .3s;
  z-index:0;
}
.tp-confirm span{position:relative;z-index:1;}
.tp-confirm.ready{opacity:1;pointer-events:all;}
.tp-confirm.ready:hover::before{transform:translateX(0);}
.tp-confirm.ready:hover{color:var(--void);box-shadow:var(--glow-c);}
.note{
  font-size:.62rem;
  color:var(--muted);
  margin-top:18px;
}
</style>
</head>
<body>
<div class="table-picker">
  <div class="logo">CLIMAX</div>
  <div class="sub">The Entertainment Hub · Makindye · Kampala</div>
  <h2 class="heading">PICK YOUR TABLE</h2>
  <p class="desc">Tap your table number below to start ordering.</p>
  <div class="table-grid" id="tableGrid"></div>
  <button class="tp-confirm" id="confirmBtn">
    <span>Enter the Lounge →</span>
  </button>
  <p class="note">Can't find your table? Ask a staff member for assistance.</p>
</div>

<script>
let selectedTable = null;

function pickTable(num, btn){
  document.querySelectorAll('.tbl-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  selectedTable = num;
  const cb = document.getElementById('confirmBtn');
  cb.querySelector('span').textContent = `Enter as Table ${num} →`;
  cb.classList.add('ready');
}

function confirmTable(){
  if(!selectedTable) return;
  window.location.href = `order.html?table=${selectedTable}`;
}

const grid = document.getElementById('tableGrid');
for(let i = 1; i <= 20; i++){
  const btn = document.createElement('button');
  btn.className = 'tbl-btn';
  btn.textContent = i;
  btn.dataset.num = i;
  btn.onclick = () => pickTable(i, btn);
  grid.appendChild(btn);
}

document.getElementById('confirmBtn').onclick = confirmTable;
</script>
</body>
</html>
